tests:
  - name: no-vulns-passes-when-report-has-no-vulnerabilities
    policy: trivy-no-vulns.hjson
    expect: PASS
    subject: "sha256:90592ae89ed6f72963e72a44ff3670d2a0cb47897c4c6a4fbe8e43b795e568bf"
    attestations:
      - ../testdata/trivy/none.intoto.json

  - name: no-vulns-fails-when-report-has-vulnerabilities
    policy: trivy-no-vulns.hjson
    expect: FAIL
    subject: "sha256:90592ae89ed6f72963e72a44ff3670d2a0cb47897c4c6a4fbe8e43b795e568bf"
    attestations:
      - ../testdata/trivy/many.intoto.json

  - name: allow-severity-passes-on-empty-report-with-no-allows
    policy: trivy-allow-severity.hjson
    expect: PASS
    subject: "sha256:90592ae89ed6f72963e72a44ff3670d2a0cb47897c4c6a4fbe8e43b795e568bf"
    attestations:
      - ../testdata/trivy/none.intoto.json

  - name: allow-severity-fails-with-default-context
    policy: trivy-allow-severity.hjson
    expect: FAIL
    subject: "sha256:90592ae89ed6f72963e72a44ff3670d2a0cb47897c4c6a4fbe8e43b795e568bf"
    attestations:
      - ../testdata/trivy/many.intoto.json

  - name: allow-severity-fails-when-only-low-is-allowed
    policy: trivy-allow-severity.hjson
    expect: FAIL
    subject: "sha256:90592ae89ed6f72963e72a44ff3670d2a0cb47897c4c6a4fbe8e43b795e568bf"
    attestations:
      - ../testdata/trivy/many.intoto.json
    context:
      - name: allowLow
        value: true

  - name: allow-severity-passes-when-all-present-severities-are-allowed
    policy: trivy-allow-severity.hjson
    expect: PASS
    subject: "sha256:90592ae89ed6f72963e72a44ff3670d2a0cb47897c4c6a4fbe8e43b795e568bf"
    attestations:
      - ../testdata/trivy/many.intoto.json
    context:
      - name: allowCritical
        value: true
      - name: allowHigh
        value: true
      - name: allowMedium
        value: true
      - name: allowLow
        value: true
